<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Louisiana Scan - Direto</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #reader { width: 90%; max-width: 400px; border-radius: 20px; overflow: hidden; border: 4px solid #10b981 !important; }
        .box { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 25px; width: 85%; text-align: center; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #1e293b; background: #0f172a; color: white; margin: 15px 0; text-align: center; }
        button { width: 100%; padding: 15px; border-radius: 12px; background: #10b981; color: white; font-weight: bold; border: none; cursor: pointer; }
        #status { margin-top: 15px; font-weight: bold; color: #10b981; }
        .flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; transition: opacity 0.1s; }
    </style>
</head>
<body>
    <div id="flash" class="flash"></div>

    <div id="setup" class="box">
        <h2 style="color:#10b981">CONECTAR</h2>
        <input type="email" id="emailUser" placeholder="Seu e-mail do PDV">
        <button onclick="conectar()">ENTRAR NO SCANNER</button>
    </div>

    <div id="scanner" style="display:none; width: 100%; text-align: center;">
        <div id="reader"></div>
        <p id="status">AGUARDANDO...</p>
        <p id="info" style="font-size: 10px; color: #64748b;"></p>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; color:#64748b; font-size:11px;">Trocar E-mail</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuob65d4nwic1hXTGSsLtc38dEoD1H0zU",
            authDomain: "pdv26-aa76b.firebaseapp.com",
            projectId: "pdv26-aa76b",
            storageBucket: "pdv26-aa76b.firebasestorage.app",
            messagingSenderId: "885941177258",
            appId: "1:885941177258:web:98f2690e07ec0a087cf9d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let emailLogado = localStorage.getItem('emailScan');

        window.conectar = () => {
            const email = document.getElementById('emailUser').value.trim().toLowerCase();
            if(email) {
                localStorage.setItem('emailScan', email);
                location.reload();
            }
        };

        if(emailLogado) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('scanner').style.display = 'block';
            document.getElementById('info').innerText = "Conectado a: " + emailLogado;
            signInAnonymously(auth).then(iniciarCamera);
        }

        async function onScanSuccess(text) {
            document.getElementById('flash').style.opacity = "1";
            try {
                // GRAVA DIRETO NA PASTA DO E-MAIL
                await addDoc(collection(db, "bipes_vendas", emailLogado, "fila"), {
                    codigo: text,
                    timestamp: Date.now()
                });
                document.getElementById('status').innerText = "ENVIADO!";
                if(navigator.vibrate) navigator.vibrate(100);
            } catch (e) { console.error(e); }
            setTimeout(() => { 
                document.getElementById('flash').style.opacity = "0";
                document.getElementById('status').innerText = "PRONTO";
            }, 600);
        }

        function iniciarCamera() {
            const html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScanSuccess);
        }
    </script>
</body>
</html>
